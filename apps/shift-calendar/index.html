<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shift Calendar</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Shift <span class="title-accent">Calendar</span></h1>
      <p>Track your work shifts and see your next shift at a glance.</p>
    </header>

    <main>
      <p id="emptyState" class="empty-state" hidden>
        No shifts registered yet. Tap a date below to add your first shift.
      </p>

      <section id="calendar-section" class="calendar-card">
        <div class="calendar-nav">
          <button type="button" id="prevMonthBtn" class="nav-btn" aria-label="Previous month">&#8249;</button>
          <h2 id="monthLabel" class="month-label"></h2>
          <button type="button" id="nextMonthBtn" class="nav-btn" aria-label="Next month">&#8250;</button>
        </div>

        <p id="nextShiftText" class="next-shift-text"></p>

        <div class="weekday-row">
          <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span>
          <span>Thu</span><span>Fri</span><span>Sat</span>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>

        <div class="legend">
          <span class="legend-item"><span class="legend-swatch legend-work"></span>Work</span>
          <span class="legend-item"><span class="legend-swatch legend-off"></span>Off</span>
          <span class="legend-item"><span class="legend-swatch legend-next"></span>Next shift</span>
          <span class="legend-item"><span class="legend-swatch legend-today"></span>Today</span>
          <span class="legend-item"><span class="legend-swatch legend-memo-dot"></span>Has a memo</span>
        </div>
      </section>
    </main>

    <div id="shiftModal" class="modal-scrim" hidden>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalDateLabel">
        <p id="modalDateLabel" class="modal-date"></p>

        <div class="status-toggle" role="group" aria-label="Shift status">
          <button type="button" id="statusWorkBtn" class="status-btn status-work">Work</button>
          <button type="button" id="statusOffBtn" class="status-btn status-off">Off</button>
        </div>

        <div id="timeFields" class="time-fields" hidden>
          <div class="time-field">
            <label for="startTimeInput">Start</label>
            <input type="time" id="startTimeInput" />
          </div>
          <div class="time-field">
            <label for="endTimeInput">End</label>
            <input type="time" id="endTimeInput" />
          </div>
        </div>

        <div class="memo-field">
          <label for="memoInput">Memo</label>
          <textarea id="memoInput" rows="3" placeholder="Plans, reminders, notes..."></textarea>
        </div>

        <div class="modal-actions">
          <button type="button" id="saveShiftBtn" class="choice-btn choice-work" disabled>Save</button>
          <button type="button" id="clearShiftBtn" class="choice-btn choice-clear">Clear</button>
        </div>
        <button type="button" id="closeModalBtn" class="secondary-btn">Cancel</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
