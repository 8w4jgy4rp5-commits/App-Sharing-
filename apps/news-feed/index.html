<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Company News Feed</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <header>
      <h1>Company News Feed</h1>
      <p>Get the latest news for any company.</p>
      <button id="changeApiKeyBtn" class="link-btn" style="display:none">Change API key</button>
    </header>

    <main>

      <!-- API key setup (stored only in this browser, never in the app's code) -->
      <section id="api-key-section" class="api-key-section">
        <p>To use this app, enter your own free GNews API key. It's saved only in your browser, never sent anywhere else.</p>
        <div id="api-key-row">
          <input
            type="password"
            id="apiKeyInput"
            placeholder="Paste your GNews API key"
            aria-label="GNews API key"
          />
          <button id="saveApiKeyBtn">Save</button>
        </div>
        <p class="api-key-hint">
          Don't have one? <a href="https://gnews.io/register" target="_blank" rel="noopener noreferrer">Get a free key</a>.
        </p>
      </section>

      <!-- Search -->
      <section id="search-section">
        <div id="search-row">
          <input
            type="text"
            id="queryInput"
            placeholder="Search company name (e.g. Apple, Tesla)"
            aria-label="Company name to search"
          />
          <button id="searchBtn">Search</button>
        </div>

        <!-- Companies from Watchlist app (auto-populated) -->
        <div id="watchlist-picks" style="display:none">
          <span class="picks-label">From your watchlist:</span>
          <div id="watchlist-buttons"></div>
        </div>
      </section>

      <!-- Article results appear here -->
      <section id="results-section">
        <div id="resultsArea"></div>
      </section>

    </main>

    <script src="script.js"></script>
  </body>
</html>
