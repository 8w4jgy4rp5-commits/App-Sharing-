<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book &amp; Show Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <header>
      <h1>Book &amp; Show Tracker</h1>
      <p>Keep track of what you want to read or watch, and what you've finished.</p>
    </header>

    <main>

      <!-- Add Item Form -->
      <section id="form-section">
        <h2>Add an Item</h2>
        <form id="itemForm">

          <div class="form-group">
            <label for="itemTitle">Title</label>
            <small>What book or show do you want to read or watch?</small>
            <input type="text" id="itemTitle" placeholder="e.g. Dune, Breaking Bad" required />
          </div>

          <div class="form-group">
            <label for="itemType">Type</label>
            <small>Is this a book or a show?</small>
            <select id="itemType">
              <option value="book">Book</option>
              <option value="show">Show</option>
            </select>
          </div>

          <div class="form-group">
            <label for="itemNotes">Notes</label>
            <small>Why do you want to check this out? (optional)</small>
            <textarea id="itemNotes" placeholder="e.g. Recommended by a friend"></textarea>
          </div>

          <button type="submit">Add to List</button>

        </form>
      </section>

      <!-- Type Filter -->
      <section id="type-filter-section">
        <button class="filter-btn active" data-type-filter="all">All Types</button>
        <button class="filter-btn" data-type-filter="book">Books</button>
        <button class="filter-btn" data-type-filter="show">Shows</button>
      </section>

      <!-- Status Filter -->
      <section id="status-filter-section">
        <button class="filter-btn active" data-status-filter="all">All Status</button>
        <button class="filter-btn" data-status-filter="want">Want to</button>
        <button class="filter-btn" data-status-filter="finished">Finished</button>
      </section>

      <!-- Item Card List -->
      <section id="list-section">
        <h2>My List <span id="listCount"></span></h2>
        <div id="itemList">
          <!-- Cards are inserted here by JavaScript -->
        </div>
      </section>

    </main>

    <script src="script.js"></script>
  </body>
</html>
