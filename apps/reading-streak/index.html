<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reading Streak</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <header>
      <span class="header-icon" aria-hidden="true">🔥</span>
      <div>
        <h1>Reading Streak</h1>
        <p>Mark each day you read to build a streak and stay motivated.</p>
      </div>
    </header>

    <main>

      <!-- Today -->
      <section id="today-section">
        <p id="todayDate" class="today-date"></p>
        <button type="button" id="todayBtn" class="today-btn">Mark Today as Read</button>
      </section>

      <!-- Stats -->
      <section id="stats-section">
        <div class="stat-card">
          <p class="stat-value" id="currentStreak">0</p>
          <p class="stat-label">Current Streak</p>
        </div>
        <div class="stat-card">
          <p class="stat-value" id="longestStreak">0</p>
          <p class="stat-label">Longest Streak</p>
        </div>
        <div class="stat-card">
          <p class="stat-value" id="booksRead">0</p>
          <p class="stat-label">Books Read</p>
        </div>
      </section>

      <!-- History -->
      <section id="history-section">
        <div class="calendar-header">
          <button type="button" id="prevMonthBtn" class="month-nav-btn" aria-label="Previous month">‹</button>
          <h2 id="calendarMonthLabel"></h2>
          <button type="button" id="nextMonthBtn" class="month-nav-btn" aria-label="Next month">›</button>
        </div>
        <div class="weekday-row">
          <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
        </div>
        <div id="historyGrid" class="history-grid">
          <!-- Day cells inserted by JavaScript -->
        </div>
      </section>

      <!-- Add Book Form -->
      <section id="book-form-section">
        <h2>Currently Reading</h2>
        <form id="bookForm">

          <div class="form-group">
            <label for="bookTitle">Title</label>
            <input type="text" id="bookTitle" placeholder="e.g. Dune" required />
          </div>

          <div class="form-group">
            <label for="bookTotalPages">Total pages</label>
            <small>Leave blank if you're not sure</small>
            <input type="number" id="bookTotalPages" min="1" placeholder="e.g. 412" />
          </div>

          <button type="submit">Add Book</button>

        </form>
      </section>

      <!-- Book List -->
      <section id="book-list-section">
        <div id="bookList">
          <!-- Book cards inserted by JavaScript -->
        </div>
      </section>

    </main>

    <script src="script.js"></script>
  </body>
</html>
