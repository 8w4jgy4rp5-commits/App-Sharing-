<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ページタイトル：ブラウザのタブに表示される -->
    <title>Requests · CobbleWorks</title>
    <!-- 見出し・本文用フォント（Nunito） -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- デザイントークン（色・角丸・影などの変数）を先に読み込む -->
    <link rel="stylesheet" href="tokens.css" />
    <!-- CSSファイルを読み込む（トップページと共通） -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-bg">
      <div class="app-bg-panel" style="width:420px;height:280px;top:60px;left:-80px;transform:rotate(-6deg);"></div>
      <div class="app-bg-panel" style="width:320px;height:320px;top:420px;right:-100px;transform:rotate(9deg);border-color:rgba(61,50,41,0.10);"></div>
      <div class="app-bg-panel" style="width:180px;height:180px;bottom:80px;left:12%;transform:rotate(3deg);border-color:rgba(61,50,41,0.10);"></div>
      <div class="app-bg-line" style="width:280px;top:140px;left:0;"></div>
      <div class="app-bg-line" style="width:340px;top:520px;right:0;"></div>
      <div class="app-bg-line" style="width:220px;bottom:160px;left:8%;"></div>
      <div class="app-bg-mark" style="top:420px;right:220px;"></div>
      <div class="app-bg-mark" style="bottom:80px;left:calc(12% + 180px);"></div>
    </div>

    <!-- サイトのヘッダー（アイコン＋文字のロゴ風レイアウト） -->
    <header>
      <a href="index.html" class="back-link">← CobbleWorks</a>
      <div class="site-logo">
        <span class="logo-mark" aria-hidden="true">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 5.5C4 4.67 4.67 4 5.5 4h13c.83 0 1.5.67 1.5 1.5v9c0 .83-.67 1.5-1.5 1.5H9l-3.8 3.2c-.45.38-1.13.06-1.13-.53V16h-1c-.83 0-1.5-.67-1.5-1.5v-9Z" fill="currentColor" />
          </svg>
        </span>
        <div class="site-logo-text">
          <h1>Requests</h1>
          <p>Browse what people are struggling with, or add your own.</p>
        </div>
      </div>
    </header>

    <main>

      <!-- 検索欄（このページ内のリクエストだけを絞り込む） -->
      <section id="search-section">
        <input
          type="text"
          id="searchInput"
          placeholder="Search requests..."
          aria-label="Search requests"
        />
      </section>

      <!-- リクエスト投稿フォーム -->
      <section id="request-form-section">
        <h2>Submit a Request</h2>
        <form id="requestForm">

          <!-- どんな困りごとか -->
          <div class="form-group">
            <label for="problem">Problem</label>
            <small>What are you struggling with?</small>
            <textarea
              id="problem"
              placeholder="e.g. I spend too much time switching between apps to track invoices"
              required
            ></textarea>
          </div>

          <!-- あったらいいなと思うもの -->
          <div class="form-group">
            <label for="desiredFeatures">Desired features</label>
            <small>What would make it better?</small>
            <textarea
              id="desiredFeatures"
              placeholder="e.g. A simple dashboard to track all invoices in one place"
              required
            ></textarea>
          </div>

          <!-- 投稿者名（任意） -->
          <div class="form-group">
            <label for="requesterName">Your name</label>
            <small>Optional — shown as "Shared by ..."</small>
            <input
              type="text"
              id="requesterName"
              placeholder="e.g. Ken"
              maxlength="30"
            />
          </div>

          <button type="submit">Submit a request</button>

        </form>
      </section>

      <!-- リクエスト一覧（カードがここに追加される） -->
      <section id="requests-list-section">
        <h2>All Requests</h2>
        <!-- カウントはブラウザ内だけの仮の数字であることを注記する -->
        <p class="local-note">* "I want this too" counts are stored locally and not shared across users.</p>
        <div id="requestsList">
          <!-- JavaScriptでカードを動的に追加する -->
        </div>
      </section>

    </main>

    <!-- JavaScriptファイルを読み込む（トップページと共通、無い要素は自動的にスキップされる） -->
    <script src="script.js"></script>
  </body>
</html>
